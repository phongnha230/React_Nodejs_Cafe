version: '3.8'

services:
  # ========== MySQL Database ==========
  mysql:
    image: mysql:8.0
    container_name: cafe_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Anhnha@1905
      MYSQL_DATABASE: coffeeshop
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cafe_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Backend API ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafe_backend
    environment:
      - DB_URL=mysql://root:Anhnha%401905@mysql:3306/coffeeshop
      - JWT_SECRET=mysecretkey
      - PORT=5000
      - FRONTEND_URL=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe_network
    volumes:
      - ./Frontend/src/assets:/app/src/assets:ro
    restart: unless-stopped

  # ========== Frontend ==========
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: cafe_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cafe_network
    restart: unless-stopped

networks:
  cafe_network:
    driver: bridge

volumes:
  mysql_data:
