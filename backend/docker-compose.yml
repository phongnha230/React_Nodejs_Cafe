services:
  # ========== MySQL Database ==========
  mysql:
    image: mysql:8.0
    container_name: cafe_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cafe_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Backend API ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe_backend
    environment:
      - DB_URL=mysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cafe_network
    restart: unless-stopped

networks:
  cafe_network:
    driver: bridge

volumes:
  mysql_data:
